# CSM Wiki 同步 Workflow
# 实施计划关联：docs/plan/README.md sync-wiki.yml
# 参考文档：docs/调研/04-CSM-Wiki-RAG知识库.md
#
# 功能：从 NEVSTOP-LAB/CSM-Wiki 拉取最新文档，合并本地补充文档，
#       然后更新向量索引。
# 触发条件：
#   - 每周日 UTC 00:00 自动运行
#   - 支持手动触发（可选择强制重建）

name: Sync CSM Wiki

on:
  schedule:
    - cron: '0 0 * * 0'   # 每周日 UTC 00:00
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重建向量库（忽略 MD5 缓存）'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 重建向量库可能较慢

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-bge-small-zh-v1.5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch remote CSM-Wiki documents
        run: |
          # 从 settings.yaml 读取远端仓库 URL
          REMOTE_REPO=$(python -c "import yaml; s=yaml.safe_load(open('config/settings.yaml',encoding='utf-8')); print(s.get('wiki',{}).get('remote_repo','https://github.com/NEVSTOP-LAB/CSM-Wiki.git'))")
          echo "正在拉取远端 CSM-Wiki: $REMOTE_REPO"
          git clone --depth=1 "$REMOTE_REPO" /tmp/csm-wiki-remote
          # 镜像到 csm-wiki/remote/，--delete 确保上游删除的文件不在本地残留
          mkdir -p csm-wiki/remote
          rsync -av --delete /tmp/csm-wiki-remote/ csm-wiki/remote/ \
            --exclude '.git' \
            --exclude 'node_modules'
          echo "远端 CSM-Wiki 文档已同步到 csm-wiki/remote/"

      - name: Cache vector stores
        uses: actions/cache@v4
        with:
          path: |
            data/vector_store
            data/reply_index
          key: vectors-${{ runner.os }}-${{ hashFiles('csm-wiki/**') }}
          restore-keys: |
            vectors-${{ runner.os }}-

      - name: Sync Wiki and rebuild vectors
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python scripts/wiki_sync.py

      - name: Commit and push changes
        run: |
          git config user.name "zhihu-csm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "wiki: sync $(date +%Y-%m-%d) [skip ci]"
          git push || echo "Nothing to push"
