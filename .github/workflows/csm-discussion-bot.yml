name: CSM Q&A Discussion Bot

on:
  # 当有新仓库级 Discussion 创建时自动触发
  discussion:
    types: [created]

  # 实时触发：由外部 Webhook Relay（Cloudflare Worker，详见 webhook/README.md）
  # 在收到组织级 discussion.created webhook 后，调用 dispatches API 触发本事件。
  # client_payload.discussion_number 必填。
  repository_dispatch:
    types: [org_discussion_created]

  # 定时扫描组织级 Discussion（作为 webhook 漏发时的兜底，组织 Discussion 不触发 discussion 事件）
  schedule:
    - cron: '*/30 * * * *'

  # 手动触发（可指定具体 Discussion 编号或 dry-run）
  workflow_dispatch:
    inputs:
      discussion_number:
        description: '仓库 Discussion 编号（与 org_discussion_number 二选一）'
        required: false
        type: string
      org_discussion_number:
        description: '组织 Discussion 编号（与 discussion_number 二选一）'
        required: false
        type: string
      dry_run:
        description: 'Dry-run 模式（只打印不发布评论）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# 同一时刻只允许一个实例运行，避免重复回复
concurrency:
  group: csm-qa-bot-${{ github.event.discussion.number || github.event.client_payload.discussion_number || inputs.discussion_number || inputs.org_discussion_number || 'scan' }}
  cancel-in-progress: false

jobs:
  answer:
    name: Answer Discussion
    runs-on: ubuntu-latest
    permissions:
      # 读取仓库内容（含 csm-wiki submodule）
      contents: read
      # 读写 Discussions（通过 Fine-grained PAT，Actions 权限仅供参考）
      discussions: write

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # 使用 Fine-grained PAT 以便拉取 submodule（若为公开仓库可省去）
          token: ${{ secrets.CSM_QA_API_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-BAAI-bge-small-zh-v1.5
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Cache vector store
        uses: actions/cache@v4
        with:
          path: .csm_qa/vector_store
          key: ${{ runner.os }}-vectorstore-${{ hashFiles('csm-wiki/**') }}
          restore-keys: |
            ${{ runner.os }}-vectorstore-

      - name: Install dependencies
        run: pip install -e .

      - name: Run bot (discussion event trigger)
        if: github.event_name == 'discussion'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          CSM_QA_API_KEY: ${{ secrets.CSM_QA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python scripts/discussion_bot.py --event

      - name: Run bot (scheduled scan for org discussions)
        if: github.event_name == 'schedule'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSM_QA_API_KEY: ${{ secrets.CSM_QA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python scripts/discussion_bot.py --scan-org

      - name: Run bot (repository_dispatch from webhook relay)
        if: github.event_name == 'repository_dispatch'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSM_QA_API_KEY: ${{ secrets.CSM_QA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DISCUSSION_NUMBER: ${{ github.event.client_payload.discussion_number }}
        run: |
          if [ -z "$DISCUSSION_NUMBER" ]; then
            echo "Error: client_payload.discussion_number 为空" >&2
            exit 1
          fi
          python scripts/discussion_bot.py --org-discussion-number "$DISCUSSION_NUMBER"

      - name: Run bot (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSM_QA_API_KEY: ${{ secrets.CSM_QA_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -n "${{ inputs.org_discussion_number }}" ]; then
            ARGS="--org-discussion-number ${{ inputs.org_discussion_number }}"
          elif [ -n "${{ inputs.discussion_number }}" ]; then
            ARGS="--discussion-number ${{ inputs.discussion_number }}"
          else
            echo "Error: 必须提供 discussion_number 或 org_discussion_number 之一" >&2
            exit 1
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/discussion_bot.py $ARGS
