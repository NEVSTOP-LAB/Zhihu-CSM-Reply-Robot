# 监控的知乎文章/问题列表
# 参考：docs/plan/README.md 四、关键配置文件格式
#
# 使用说明：
#   - id: 知乎文章或问题的 ID（从 URL 中提取）
#   - title: 文章/问题标题（仅用于日志和归档显示）
#   - url: 原始链接（仅用于记录，不影响 API 调用）
#   - type: "article"（专栏文章）或 "question"（问答）
#
# 注意：所有运行参数统一在 config/settings.yaml 中管理

articles:
