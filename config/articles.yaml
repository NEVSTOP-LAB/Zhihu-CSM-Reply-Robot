# AI-002: 监控的知乎文章/问题/专栏/用户列表
# 参考: docs/plan/README.md § 四、关键配置文件格式
#
# 维护说明：
# - 仅包含需要监控回复的目标
# - type 字段支持：
#   - "article" — 单篇专栏文章
#   - "question" — 知乎问题（监控该问题下所有回答的评论）
#   - "column" — 整个专栏（自动展开为该专栏下全部文章）
#   - "user_answers" — 某人发布的全部回答
# - 所有运行参数统一在 config/settings.yaml 中管理

articles:
  - id: "98765432"
    title: "CSM 最佳实践系列（一）"
    url: "https://zhuanlan.zhihu.com/p/98765432"
    type: "article"
  - id: "123456789"
    title: "如何做好客户成功？"
    url: "https://www.zhihu.com/question/123456789"
    type: "question"
